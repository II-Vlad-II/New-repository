services:
  postgres:
    image: postgres:16-alpine
    container_name: health_beauty_postgres
    environment:
      POSTGRES_DB: health_beauty_inventory
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d health_beauty_inventory"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: health_beauty_app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/health_beauty_inventory
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SERVER_PORT: 8080
      UNSPLASH_ACCESS_KEY: ${UNSPLASH_ACCESS_KEY:-}
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  postgres_data:
